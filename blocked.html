    h1 { color: #d32f2f; }
    .url { background: #f5f5f5; padding: 10px; word-break: break-all; }
    a { color: #1976d2; text-decoration: none; }
  </style>
</head>
<body>
  <div class="blocked">
    <h1>⛔ 访问被阻止</h1>
    <p>您试图访问的网址已被加入黑名单：</p>

    <p><a href="#" id="optionsLink">前往黑名单设置</a> | <a href="javascript:history.back()">返回上一页</a></p>
  </div>
  <script src="blocked.js"></script>

</html>
