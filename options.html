<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>黑名单设置</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    h1 { font-size: 1.5em; }
    input, button { padding: 5px; margin: 5px 0; }
    ul { list-style: none; padding: 0; }
    li { margin: 5px 0; padding: 5px; background: #f5f5f5; display: flex; align-items: center; }
    li span { flex: 1; }
    .remove { background: #ff4444; color: white; border: none; cursor: pointer; }
    .note { font-size: 0.9em; color: #666; }
  </style>
</head>
<body>
  <h1>黑名单管理</h1>
  <p class="note">支持两种输入：域名（如 <code>youtube.com</code>，会连同子域名一起屏蔽）或完整网址（如 <code>https://example.com/path?a=1</code>，只屏蔽该具体页面）。</p>
  <div>
    <input type="text" id="domainInput" placeholder="输入域名或完整网址">
    <button id="addBtn">添加</button>
  </div>
  <h2>当前黑名单</h2>
  <ul id="blacklistContainer"></ul>
  <script src="options.js"></script>
</body>
</html>
